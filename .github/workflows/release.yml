# Release workflow — manually triggered from Actions → Release → Run workflow.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64      — base64-encoded keystore file: base64 -i your.keystore
#   KEY_STORE_PASSWORD   — keystore password
#   KEY_ALIAS            — key alias
#   KEY_PASSWORD         — key password

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (major.minor.patch)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format '$VERSION'. Expected major.minor.patch (e.g. 1.0.0)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing tag or release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "ERROR: Tag v$VERSION already exists."
            exit 1
          fi
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "ERROR: Release v$VERSION already exists."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEY_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "batteryinfoserver_${{ inputs.version }}.apk"

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            "batteryinfoserver_${{ inputs.version }}.apk"
